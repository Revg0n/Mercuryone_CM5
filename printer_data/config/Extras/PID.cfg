[gcode_macro PID_TUNE_PROFILE]
description: Runs PID_CALIBRATE and saves the result as a named Kalico PID profile
gcode:
    {% set heater = params.HEATER|default("extruder") %}
    {% set target = params.TARGET|float %}
    {% set tolerance = params.TOLERANCE|default(0.02)|float %}
    {% set profile = params.PROFILE|default(heater ~ "_" ~ (target|int)|string) %}

    {action_respond_info("Starting PID calibration for %s at %.1fC, will save as profile '%s'" % (heater, target, profile))}

    PID_CALIBRATE HEATER={heater} TARGET={target} TOLERANCE={tolerance} WRITE_FILE=1

    PID_PROFILE SAVE={profile} HEATER={heater}
    SAVE_CONFIG